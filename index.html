<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>占城大师</title>
<link rel="icon" href="data:,">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: monospace;
    color: #eee;
    min-height: 100vh;
  }
  #ui-bar {
    width: 100%;
    max-width: 600px;
    display: flex;
    justify-content: space-between;
    padding: 8px 16px;
    background: #16213e;
    border-bottom: 2px solid #0f3460;
  }
  .gold-display {
    font-size: 16px;
    padding: 4px 12px;
  }
  #game-canvas {
    border: 2px solid #0f3460;
    margin-top: 8px;
    cursor: pointer;
  }
</style>
</head>
<body>

<div id="ui-bar">
  <div class="gold-display" id="player-gold">玩家: 0 金</div>
  <div class="gold-display" id="ai-gold">AI: 0 金</div>
</div>
<canvas id="game-canvas" width="600" height="500"></canvas>

<script>
// ============================================================
// GameLoop: 10Hz fixed timestep via requestAnimationFrame
// ============================================================
function createGameLoop(updateFn) {
  const STEP = 100; // 100ms = 10Hz
  let lastTime = 0;
  let accumulator = 0;
  let running = false;

  function loop(timestamp) {
    if (!running) return;
    if (!lastTime) lastTime = timestamp;
    const delta = timestamp - lastTime;
    lastTime = timestamp;
    accumulator += delta;

    while (accumulator >= STEP) {
      updateFn();
      accumulator -= STEP;
    }

    requestAnimationFrame(loop);
  }

  return {
    start() { running = true; lastTime = 0; requestAnimationFrame(loop); },
    stop() { running = false; }
  };
}

// ============================================================
// HexGrid: 六边形网格坐标计算与渲染
// ============================================================
const HexGrid = {
  cols: 5,
  rows: 7,
  hexSize: 32,

  // 生成 5×7 网格的所有轴向坐标 (q, r)
  generateCoords(cols, rows) {
    const coords = [];
    for (let r = 0; r < rows; r++) {
      for (let q = 0; q < cols; q++) {
        coords.push({ q, r });
      }
    }
    return coords;
  },

  // 平顶六边形：轴向坐标 → 像素中心点
  hexToPixel(q, r, size) {
    const x = size * (Math.sqrt(3) * q + Math.sqrt(3) / 2 * r);
    const y = size * (1.5 * r);
    return { x, y };
  }
};

// ============================================================
// TileReveal: 翻牌逻辑、地块内容生成
// ============================================================
const TileReveal = {
  // 地块类型权重: 40%金矿 / 30%空地 / 20%野怪 / 10%特殊
  TILE_TYPES: [
    { type: 'mine', weight: 40 },
    { type: 'empty', weight: 30 },
    { type: 'monster', weight: 20 },
    { type: 'special', weight: 10 }
  ],

  // 简单种子随机数生成器
  seededRandom(seed) {
    let s = seed;
    return function() {
      s = (s * 16807 + 0) % 2147483647;
      return (s - 1) / 2147483646;
    };
  },

  // 根据权重选择地块类型
  pickTileType(rng) {
    const roll = rng() * 100;
    let cumulative = 0;
    for (const t of this.TILE_TYPES) {
      cumulative += t.weight;
      if (roll < cumulative) return t.type;
    }
    return this.TILE_TYPES[this.TILE_TYPES.length - 1].type;
  },

  // 使用固定种子生成地图地块分布
  generateMap(cols, rows, seed = 42) {
    const rng = this.seededRandom(seed);
    const coords = HexGrid.generateCoords(cols, rows);
    const tiles = {};

    for (const { q, r } of coords) {
      const key = `${q},${r}`;
      tiles[key] = {
        q, r,
        revealed: false,
        type: this.pickTileType(rng),
        owner: 'neutral'
      };
    }

    // 大本营：玩家端 r=0 中间列，AI 端 r=rows-1 中间列
    const midCol = Math.floor(cols / 2);
    const playerBaseKey = `${midCol},0`;
    const aiBaseKey = `${midCol},${rows - 1}`;

    tiles[playerBaseKey].revealed = true;
    tiles[playerBaseKey].type = 'base';
    tiles[playerBaseKey].owner = 'player';

    tiles[aiBaseKey].revealed = true;
    tiles[aiBaseKey].type = 'base';
    tiles[aiBaseKey].owner = 'ai';

    return { tiles, playerBase: playerBaseKey, aiBase: aiBaseKey };
  },

  // 尝试翻牌：返回翻牌结果（不做金币检查，由 ResourceSystem 处理）
  reveal(tileKey, tiles) {
    const tile = tiles[tileKey];
    if (!tile || tile.revealed) {
      return { success: false, reason: tile ? 'already revealed' : 'invalid tile' };
    }
    tile.revealed = true;
    return { success: true, tileType: tile.type };
  }
};

// ============================================================
// ResourceSystem: 金币收入/支出、金矿产出
// ============================================================
const ResourceSystem = {
  REVEAL_COST: 10,
  MINE_BONUS: 50,       // 翻出金矿立即获得
  MINE_INCOME: 5,       // 每秒每个金矿产出
  INCOME_INTERVAL: 1000, // 1Hz tick 间隔(ms)

  // 创建资源状态
  create(initialGold = 50) {
    return { gold: initialGold, mineCount: 0 };
  },

  // 尝试翻牌：消耗金币，返回结果
  tryReveal(resources) {
    if (resources.gold < this.REVEAL_COST) {
      return { success: false, reason: 'not enough gold' };
    }
    resources.gold -= this.REVEAL_COST;
    return { success: true };
  },

  // 翻出金矿：立即获得启动资金 + 记录金矿数量
  onMineRevealed(resources) {
    resources.gold += this.MINE_BONUS;
    resources.mineCount++;
  },

  // 1Hz tick：根据金矿数量产出金币
  tick(resources) {
    const income = resources.mineCount * this.MINE_INCOME;
    if (income > 0) {
      resources.gold += income;
    }
    return income;
  }
};

// ============================================================
// Unit movement: move toward enemy base, claim neutral tiles
// ============================================================
function moveUnits(state) {
  const enemyBaseFor = {
    player: state.aiBase,
    ai: state.playerBase
  };

  // 按单位分组（同一格子多个单位只移动一次）
  const moved = new Set();

  for (const unit of state.units) {
    if (unit.currentHp <= 0) continue;
    const unitId = `${unit.type}-${unit.tileKey}-${unit.owner}`;
    if (moved.has(unitId)) continue;
    moved.add(unitId);

    const targetBase = enemyBaseFor[unit.owner];
    const [targetQ, targetR] = targetBase.split(',').map(Number);

    // 计算向目标方向的一步移动（axial 坐标差）
    const dq = Math.sign(targetQ - unit.q);
    const dr = Math.sign(targetR - unit.r);

    // 尝试移动到的下一个格子
    let nextQ = unit.q + dq;
    let nextR = unit.r + dr;

    // 如果某个方向已对齐，只移动另一个方向
    if (targetQ === unit.q) nextQ = unit.q;
    if (targetR === unit.r) nextR = unit.r;

    // 边界检查
    nextQ = Math.max(0, Math.min(MAP_COLS - 1, nextQ));
    nextR = Math.max(0, Math.min(MAP_ROWS - 1, nextR));

    if (nextQ === unit.q && nextR === unit.r) continue; // 已在目标或无法移动

    const nextKey = `${nextQ},${nextR}`;
    const nextTile = state.tiles[nextKey];

    if (nextTile && nextTile.revealed && nextTile.owner === 'neutral') {
      // 占领中立格子
      nextTile.owner = unit.owner;
      unit.tileKey = nextKey;
      unit.q = nextQ;
      unit.r = nextR;
    } else if (nextTile && nextTile.revealed && nextTile.owner !== unit.owner) {
      // 移动到敌方/已有单位格子（暂不处理战斗，只移动）
      unit.tileKey = nextKey;
      unit.q = nextQ;
      unit.r = nextR;
    }
  }

  // 清理死亡单位
  state.units = state.units.filter(u => u.currentHp > 0);
}

// ============================================================
// CombatSystem: 单位移动、交战、克制、死亡
// ============================================================

// 平顶六边形相邻坐标偏移（axial）
const HEX_NEIGHBORS = [
  { dq: 1, dr: 0 }, { dq: 1, dr: -1 }, { dq: 0, dr: -1 },
  { dq: -1, dr: 0 }, { dq: -1, dr: 1 }, { dq: 0, dr: 1 }
];

// 计算克制倍率：attacker.type 对 defender.type
function getCounterMultiplier(attacker, defender) {
  if (UNIT_TYPES[attacker.type].counters === defender.type) {
    return COUNTER_MULTIPLIER; // 克制方 ×1.5
  }
  if (UNIT_TYPES[defender.type].counters === attacker.type) {
    return BEING_COUNTERED_MULTIPLIER; // 被克方 ×0.5
  }
  return 1.0; // 无克制关系 ×1.0
}

// 计算实际伤害
function calcDamage(attacker, defender) {
  return Math.round(attacker.atk * getCounterMultiplier(attacker, defender));
}

// 战斗 tick：每秒检测相邻敌对单位并结算伤害
function combatTick(state) {
  const attacks = []; // 记录攻击对，避免重复
  const attackedPairs = new Set();

  for (let i = 0; i < state.units.length; i++) {
    const unitA = state.units[i];
    if (unitA.currentHp <= 0) continue;

    for (let j = i + 1; j < state.units.length; j++) {
      const unitB = state.units[j];
      if (unitB.currentHp <= 0) continue;

      // 只处理敌对单位
      if (unitA.owner === unitB.owner) continue;

      // 检查是否相邻
      const dq = Math.abs(unitA.q - unitB.q);
      const dr = Math.abs(unitA.r - unitB.r);
      const isAdjacent = HEX_NEIGHBORS.some(n =>
        unitA.q + n.dq === unitB.q && unitA.r + n.dr === unitB.r
      );

      if (!isAdjacent) continue;

      // 避免重复处理同一对
      const pairKey = [unitA.tileKey, unitB.tileKey].sort().join('-');
      if (attackedPairs.has(pairKey)) continue;
      attackedPairs.add(pairKey);

      // 双方互相攻击（每秒交战频率）
      const dmgAtoB = calcDamage(unitA, unitB);
      const dmgBtoA = calcDamage(unitB, unitA);
      unitB.currentHp -= dmgAtoB;
      unitA.currentHp -= dmgBtoA;
    }
  }
}

// ============================================================
// Embedded assertions: HexGrid coordinate generation
// ============================================================
(function testHexGrid() {
  const coords = HexGrid.generateCoords(5, 7);
  console.assert(coords.length === 35, `HexGrid should generate 35 coords for 5x7, got ${coords.length}`);

  // 检查边界坐标
  console.assert(coords[0].q === 0 && coords[0].r === 0, 'First coord should be (0,0)');
  console.assert(coords[34].q === 4 && coords[34].r === 6, 'Last coord should be (4,6)');

  // 检查像素坐标计算
  const px = HexGrid.hexToPixel(0, 0, 32);
  console.assert(px.x === 0 && px.y === 0, 'hexToPixel(0,0) should be (0,0)');

  const px2 = HexGrid.hexToPixel(1, 0, 32);
  console.assert(Math.abs(px2.x - 32 * Math.sqrt(3)) < 0.001, 'hexToPixel(1,0) x should be size*sqrt(3)');
  console.assert(px2.y === 0, 'hexToPixel(1,0) y should be 0 for same row');

  console.log('[test] HexGrid coordinate tests passed');
})();

// ============================================================
// Embedded assertions: TileReveal map generation
// ============================================================
(function testTileReveal() {
  // 测试固定种子可复现
  const map1 = TileReveal.generateMap(5, 7, 42);
  const map2 = TileReveal.generateMap(5, 7, 42);
  console.assert(JSON.stringify(map1.tiles) === JSON.stringify(map2.tiles), 'Same seed should produce identical maps');

  // 测试大本营位置
  console.assert(map1.tiles['2,0'].revealed === true, 'Player base at (2,0) should be revealed');
  console.assert(map1.tiles['2,0'].type === 'base', 'Player base type should be "base"');
  console.assert(map1.tiles['2,0'].owner === 'player', 'Player base owner should be "player"');
  console.assert(map1.tiles['2,6'].revealed === true, 'AI base at (2,6) should be revealed');
  console.assert(map1.tiles['2,6'].owner === 'ai', 'AI base owner should be "ai"');

  // 测试其他格子初始为迷雾
  console.assert(map1.tiles['0,1'].revealed === false, 'Non-base tiles should start as fog');

  // 测试翻牌消耗（金币检查由 ResourceSystem 处理，这里只测状态变更）
  const result = TileReveal.reveal('0,1', map1.tiles);
  console.assert(result.success === true, 'Reveal un-revealed tile should succeed');
  console.assert(result.tileType !== undefined, 'Result should include tileType');
  console.assert(map1.tiles['0,1'].revealed === true, 'Tile should be revealed after success');

  // 测试已翻牌
  const dupResult = TileReveal.reveal('0,1', map1.tiles);
  console.assert(dupResult.success === false, 'Revealing already revealed tile should fail');

  console.log('[test] TileReveal tests passed');
})();

// ============================================================
// GameState initialization
// ============================================================
const MAP_COLS = 5;
const MAP_ROWS = 7;
const MAP_SEED = 42;

function initGameState() {
  const map = TileReveal.generateMap(MAP_COLS, MAP_ROWS, MAP_SEED);
  return {
    playerResources: ResourceSystem.create(50),
    aiResources: ResourceSystem.create(50),
    lastIncomeTime: 0,
    units: [],
    ...map
  };
}

let gameState = initGameState();

// ============================================================
// UI update
// ============================================================
function updateUI() {
  document.getElementById('player-gold').textContent = `玩家: ${gameState.playerResources.gold} 金`;
  document.getElementById('ai-gold').textContent = `AI: ${gameState.aiResources.gold} 金`;
}

// ============================================================
// Canvas setup
// ============================================================
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');

// 地块颜色映射
const TILE_COLORS = {
  fog: '#2a2a4a',
  mine: '#b8860b',
  empty: '#4a6741',
  monster: '#8b0000',
  special: '#4b0082',
  base_player: '#2266cc',
  base_ai: '#cc2222'
};

// 绘制单个六边形（平顶）
function drawHex(cx, cy, size, fillColor, strokeColor = '#333') {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const angle = Math.PI / 180 * (60 * i - 30);
    const x = cx + size * Math.cos(angle);
    const y = cy + size * Math.sin(angle);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle = fillColor;
  ctx.fill();
  ctx.strokeStyle = strokeColor;
  ctx.stroke();
}

// 绘制文字在六边形中心
function drawHexLabel(cx, cy, text, fontSize = 10, color = '#fff') {
  ctx.fillStyle = color;
  ctx.font = `${fontSize}px monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, cx, cy);
}

// ============================================================
// Render the full grid
// ============================================================
function renderGrid() {
  if (!gameState) return;
  const { tiles } = gameState;
  const size = HexGrid.hexSize;

  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (const key of Object.keys(tiles)) {
    const tile = tiles[key];
    const { x, y } = HexGrid.hexToPixel(tile.q, tile.r, size);

    // 偏移使地图居中
    const offsetX = 100;
    const offsetY = 100;
    const cx = x + offsetX;
    const cy = y + offsetY;

    let color;
    if (!tile.revealed) {
      color = TILE_COLORS.fog;
    } else if (tile.type === 'base') {
      color = tile.owner === 'player' ? TILE_COLORS.base_player : TILE_COLORS.base_ai;
    } else {
      color = TILE_COLORS[tile.type] || TILE_COLORS.fog;
    }

    drawHex(cx, cy, size - 1, color);

    // 已翻开的显示类型标签
    if (tile.revealed) {
      const labels = { mine: '金矿', empty: '空地', monster: '野怪', special: '特殊', base: '大本营' };
      drawHexLabel(cx, cy, labels[tile.type] || '', 9);
    }

    // 兵营标识
    if (tile.building === 'barracks') {
      drawHexLabel(cx, cy - 10, '兵营', 8, '#ffff00');
    }
  }
}

// 绘制单位
function renderUnits() {
  if (!gameState || !gameState.units) return;
  const size = HexGrid.hexSize;
  const offsetX = 100;
  const offsetY = 100;

  for (const unit of gameState.units) {
    const { x, y } = HexGrid.hexToPixel(unit.q, unit.r, size);
    const cx = x + offsetX;
    const cy = y + offsetY;

    // 单位图标（兵种首字）
    const icon = unit.name[0];
    const color = unit.owner === 'player' ? '#66aaff' : '#ff6666';
    drawHexLabel(cx, cy + 10, icon, 11, color);

    // 血条
    const hpRatio = unit.currentHp / unit.hp;
    const barWidth = 20;
    const barHeight = 3;
    const barX = cx - barWidth / 2;
    const barY = cy + 16;
    ctx.fillStyle = '#333';
    ctx.fillRect(barX, barY, barWidth, barHeight);
    ctx.fillStyle = hpRatio > 0.5 ? '#4caf50' : hpRatio > 0.25 ? '#ff9800' : '#f44336';
    ctx.fillRect(barX, barY, barWidth * hpRatio, barHeight);
  }
}

function render() {
  renderGrid();
  renderUnits();
}

// ============================================================
// Click handling: reveal tiles on click
// ============================================================
canvas.addEventListener('click', (event) => {
  const rect = canvas.getBoundingClientRect();
  const mx = event.clientX - rect.left;
  const my = event.clientY - rect.top;

  const clickedHex = findHexAt(mx, my);
  if (!clickedHex) return;

  const tileKey = `${clickedHex.q},${clickedHex.r}`;
  const tile = gameState.tiles[tileKey];
  if (!tile) return;

  // 迷雾地块：翻牌
  if (!tile.revealed) {
    const revealResult = ResourceSystem.tryReveal(gameState.playerResources);
    if (!revealResult.success) {
      if (revealResult.reason === 'not enough gold') {
        showNotification('金币不足！');
      }
      return;
    }

    const result = TileReveal.reveal(tileKey, gameState.tiles);
    if (result.success) {
      if (result.tileType === 'mine') {
        ResourceSystem.onMineRevealed(gameState.playerResources);
      }
    }
    updateUI();
    render();
    return;
  }

  // 已翻开的空地：尝试建造兵营
  if (tile.revealed && tile.type === 'empty' && tile.owner === 'player') {
    const buildResult = BarracksSystem.tryBuild(gameState.playerResources, tile, tileKey, gameState.tiles, 'player');
    if (buildResult.success) {
      showNotification('兵营建造成功！');
    } else if (buildResult.reason === 'not enough gold') {
      showNotification('金币不足！');
    } else if (buildResult.reason === 'already has barracks') {
      showNotification('已有兵营！');
    }
    updateUI();
    render();
    return;
  }
});

// 查找鼠标位置对应的六边形（通过最近距离匹配）
function findHexAt(mx, my) {
  const { tiles } = gameState;
  const size = HexGrid.hexSize;
  const offsetX = 100;
  const offsetY = 100;

  let closest = null;
  let closestDist = Infinity;

  for (const key of Object.keys(tiles)) {
    const tile = tiles[key];
    const { x, y } = HexGrid.hexToPixel(tile.q, tile.r, size);
    const cx = x + offsetX;
    const cy = y + offsetY;

    const dist = Math.sqrt((mx - cx) ** 2 + (my - cy) ** 2);
    if (dist < closestDist && dist < size) {
      closestDist = dist;
      closest = tile;
    }
  }
  return closest;
}

// 简单通知提示
let notificationText = '';
let notificationTimer = 0;

function showNotification(text, duration = 1500) {
  notificationText = text;
  notificationTimer = duration;
}

function renderNotification() {
  if (notificationTimer > 0) {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
    ctx.fillRect(canvas.width / 2 - 60, canvas.height - 40, 120, 30);
    ctx.fillStyle = '#fff';
    ctx.font = '12px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(notificationText, canvas.width / 2, canvas.height - 25);
  }
}

// ============================================================
// Main loop: 10Hz update
// ============================================================
let tickCount = 0;
const gameLoop = createGameLoop(() => {
  tickCount++;
  if (notificationTimer > 0) {
    notificationTimer -= 100;
    if (notificationTimer <= 0) notificationText = '';
  }

  // 1Hz 金矿产出 tick（每 10 个 100ms tick 触发一次）
  if (tickCount % 10 === 0) {
    ResourceSystem.tick(gameState.playerResources);
    ResourceSystem.tick(gameState.aiResources);
  }

  // 兵营每 100ms tick 产出单位
  const playerUnits = BarracksSystem.tick(gameState.tiles, 'player', gameState.aiBase);
  const aiUnits = BarracksSystem.tick(gameState.tiles, 'ai', gameState.playerBase);
  if (playerUnits.length > 0 || aiUnits.length > 0) {
    gameState.units = (gameState.units || []).concat(playerUnits, aiUnits);
  }

  // 单位移动：每 1Hz 移动一次（向敌方大本营方向）
  if (tickCount % 10 === 0) {
    moveUnits(gameState);
  }

  // 战斗：每 1Hz 检测相邻敌对单位并交战
  if (tickCount % 10 === 0) {
    combatTick(gameState);
  }

  render();
  renderNotification();
  updateUI();
});

gameLoop.start();

// ============================================================
// BarracksSystem: 兵营建造、单位产出调度
// ============================================================
const UNIT_TYPES = {
  infantry:  { name: '步兵', hp: 220, atk: 15, counters: 'cavalry' },
  cavalry:   { name: '骑兵', hp: 180, atk: 18, counters: 'archer' },
  archer:    { name: '弓箭手', hp: 120, atk: 20, counters: 'infantry' }
};

const COUNTER_MULTIPLIER = 1.5;
const BEING_COUNTERED_MULTIPLIER = 0.5;

const BarracksSystem = {
  BUILD_COST: 40,
  SPAWN_INTERVAL: 3000, // 3 秒产出一个单位

  // 尝试建造兵营：消耗金币，在空地格创建兵营
  tryBuild(resources, tile, tileKey, tiles, owner) {
    if (tile.type !== 'empty') {
      return { success: false, reason: 'not empty tile' };
    }
    if (tile.owner !== owner) {
      return { success: false, reason: 'not owned' };
    }
    if (tile.building === 'barracks') {
      return { success: false, reason: 'already has barracks' };
    }
    if (resources.gold < this.BUILD_COST) {
      return { success: false, reason: 'not enough gold' };
    }

    resources.gold -= this.BUILD_COST;
    tiles[tileKey].building = 'barracks';
    tiles[tileKey].spawnTimer = 0;
    return { success: true };
  },

  // 100ms tick：更新兵营产出计时器，达到间隔时产出单位
  tick(tiles, owner, enemyBaseKey) {
    const spawnedUnits = [];
    for (const key of Object.keys(tiles)) {
      const tile = tiles[key];
      if (tile.building === 'barracks' && tile.owner === owner) {
        tile.spawnTimer = (tile.spawnTimer || 0) + 100;
        if (tile.spawnTimer >= this.SPAWN_INTERVAL) {
          tile.spawnTimer = 0;
          const unitType = this.randomUnitType();
          const unit = {
            type: unitType,
            ...UNIT_TYPES[unitType],
            currentHp: UNIT_TYPES[unitType].hp,
            owner: owner,
            tileKey: key,
            q: tile.q,
            r: tile.r
          };
          spawnedUnits.push(unit);
        }
      }
    }
    return spawnedUnits;
  },

  // 随机兵种类型（等概率）
  randomUnitType() {
    const types = Object.keys(UNIT_TYPES);
    return types[Math.floor(Math.random() * types.length)];
  }
};

(function testResourceSystem() {
  // 测试初始状态
  const res = ResourceSystem.create(50);
  console.assert(res.gold === 50, `Initial gold should be 50, got ${res.gold}`);
  console.assert(res.mineCount === 0, `Initial mine count should be 0, got ${res.mineCount}`);

  // 测试翻牌消耗
  const revealResult = ResourceSystem.tryReveal(res);
  console.assert(revealResult.success === true, 'tryReveal with enough gold should succeed');
  console.assert(res.gold === 40, `Gold should be 40 after reveal, got ${res.gold}`);

  // 测试金币不足
  const res2 = ResourceSystem.create(5);
  const failResult = ResourceSystem.tryReveal(res2);
  console.assert(failResult.success === false, 'tryReveal with insufficient gold should fail');
  console.assert(failResult.reason === 'not enough gold', 'Fail reason should be "not enough gold"');
  console.assert(res2.gold === 5, 'Gold should not change on failed reveal');

  // 测试金矿翻出：立即 +50 + 记录矿数
  const res3 = ResourceSystem.create(50);
  ResourceSystem.onMineRevealed(res3);
  console.assert(res3.gold === 100, `Gold after mine should be 100, got ${res3.gold}`);
  console.assert(res3.mineCount === 1, `Mine count should be 1, got ${res3.mineCount}`);

  // 测试多个金矿叠加
  ResourceSystem.onMineRevealed(res3);
  console.assert(res3.gold === 150, `Gold after 2nd mine should be 150, got ${res3.gold}`);
  console.assert(res3.mineCount === 2, `Mine count should be 2, got ${res3.mineCount}`);

  // 测试 1Hz tick 产出
  const res4 = ResourceSystem.create(0);
  ResourceSystem.onMineRevealed(res4); // 1 mine
  const income1 = ResourceSystem.tick(res4);
  console.assert(income1 === 5, `Tick income with 1 mine should be 5, got ${income1}`);
  console.assert(res4.gold === 55, `Gold after tick should be 55 (50+5), got ${res4.gold}`);

  // 测试多金矿叠加产出（直接修改 mineCount 模拟已有 2 矿）
  res4.mineCount = 2;
  const income2 = ResourceSystem.tick(res4);
  console.assert(income2 === 10, `Tick income with 2 mines should be 10, got ${income2}`);

  // 测试无金矿时 tick 不产出
  const res5 = ResourceSystem.create(100);
  const income0 = ResourceSystem.tick(res5);
  console.assert(income0 === 0, `Tick income with 0 mines should be 0, got ${income0}`);
  console.assert(res5.gold === 100, `Gold should not change with 0 mines, got ${res5.gold}`);

  console.log('[test] ResourceSystem tests passed');
})();

(function testBarracksSystem() {

  };

  const result1 = BarracksSystem.tryBuild(res, tiles['0,0'], '0,0', tiles, 'player');

  // 测试非己方领地不能建造
  const result3 = BarracksSystem.tryBuild(res2, tiles['2,0'], '2,0', tiles, 'player');

  // 测试已有兵营不能重复建造
  const res3 = ResourceSystem.create(50);
  const result4 = BarracksSystem.tryBuild(res3, tiles['0,0'], '0,0', tiles, 'player');
  console.assert(result4.success === false, 'Build on existing barracks should fail');

  // 测试金币不足

  const emptyTile = { q: 3, r: 0, type: 'empty', owner: 'player', revealed: true, building: undefined };
  tiles['3,0'] = emptyTile;
  const result5 = BarracksSystem.tryBuild(res4, emptyTile, '3,0', tiles, 'player');
  console.assert(result5.success === false, 'Build with insufficient gold should fail');

  // 测试随机兵种生成
  const unitType = BarracksSystem.randomUnitType();
  console.assert(UNIT_TYPES[unitType] !== undefined, `Random unit type should be valid, got ${unitType}`);

  // 测试兵营 tick 产出单位
  const barracksTile = { q: 0, r: 0, type: 'empty', owner: 'player', revealed: true, building: 'barracks', spawnTimer: 0 };
  const testTiles = { '0,0': barracksTile };

  // 模拟 30 次 tick（3 秒 = 30 × 100ms），第 30 次 tick 时 spawnTimer 达到 3000
  for (let i = 0; i < 30; i++) {
    const units2 = BarracksSystem.tick(testTiles, 'player', '2,6');
    if (i < 29) {
      console.assert(units2.length === 0, `No units before 30th tick, got ${units2.length} at tick ${i}`);
    } else {
      console.assert(units2.length === 1, `Should spawn 1 unit at 30th tick, got ${units2.length}`);
      const unit = units2[0];
      console.assert(unit.owner === 'player', 'Unit owner should be player');
      console.assert(unit.currentHp > 0, 'Unit HP should be positive');
      console.assert(UNIT_TYPES[unit.type] !== undefined, 'Unit type should be valid');
    }
  }

  console.log('[test] BarracksSystem tests passed');
})();

// Embedded assertions: Unit movement and tile claiming
// ============================================================
(function testUnitMovement() {
  const state = {
    tiles: {
      '0,0': { q: 0, r: 0, type: 'empty', owner: 'player', revealed: true },
      '1,0': { q: 1, r: 0, type: 'empty', owner: 'neutral', revealed: true },
      '2,0': { q: 2, r: 0, type: 'empty', owner: 'neutral', revealed: true }
    },
    units: [
      { type: 'infantry', name: '步兵', hp: 220, atk: 15, currentHp: 220, owner: 'player', tileKey: '0,0', q: 0, r: 0 }
    ],
    aiBase: '2,0',
    playerBase: '0,0'
  };

  // 初始单位在 (0,0)
  console.assert(state.units[0].q === 0, 'Unit should start at q=0');
  console.assert(state.units[0].r === 0, 'Unit should start at r=0');

  moveUnits(state);

  // 移动后单位应该到了 (1,0)（中立格子被占领）
  console.assert(state.units[0].q === 1, `Unit should move to q=1, got ${state.units[0].q}`);
  console.assert(state.units[0].r === 0, `Unit r should be 0, got ${state.units[0].r}`);
  console.assert(state.tiles['1,0'].owner === 'player', 'Neutral tile should be claimed by player');

  moveUnits(state);

  // 再移动到 (2,0)
  console.assert(state.units[0].q === 2, `Unit should move to q=2, got ${state.units[0].q}`);
  console.assert(state.tiles['2,0'].owner === 'player', 'Enemy-adjacent tile should be claimed');

  // 测试死亡单位被清理
  state.units.push({ type: 'cavalry', name: '骑兵', hp: 180, atk: 18, currentHp: 0, owner: 'ai', tileKey: '0,0', q: 0, r: 0 });
  moveUnits(state);
  const aliveUnits = state.units.filter(u => u.currentHp > 0);
  console.assert(state.units.length === aliveUnits.length, 'Dead units should be removed after moveUnits');

  console.log('[test] Unit movement tests passed');
})();

// Embedded assertions: CombatSystem counter damage
// ============================================================
(function testCombatDamage() {
  // 步兵克制骑兵：步兵 ATK 15 × 1.5 = 22
  const infantry = { type: 'infantry', atk: 15 };
  const cavalry = { type: 'cavalry', atk: 18 };
  const archer = { type: 'archer', atk: 20 };

  console.assert(getCounterMultiplier(infantry, cavalry) === 1.5, 'Infantry vs cavalry should be ×1.5 (counter)');
  console.assert(getCounterMultiplier(cavalry, infantry) === 0.5, 'Cavalry vs infantry should be ×0.5 (countered)');
  console.assert(getCounterMultiplier(infantry, infantry) === 1.0, 'Infantry vs infantry should be ×1.0 (no counter)');

  // 骑兵克制弓箭手
  console.assert(getCounterMultiplier(cavalry, archer) === 1.5, 'Cavalry vs archer should be ×1.5 (counter)');
  console.assert(getCounterMultiplier(archer, cavalry) === 0.5, 'Archer vs cavalry should be ×0.5 (countered)');

  // 弓箭手克制步兵
  console.assert(getCounterMultiplier(archer, infantry) === 1.5, 'Archer vs infantry should be ×1.5 (counter)');
  console.assert(getCounterMultiplier(infantry, archer) === 0.5, 'Infantry vs archer should be ×0.5 (countered)');

  // 实际伤害计算
  console.assert(calcDamage(infantry, cavalry) === 23, `Infantry vs cavalry damage should be 23 (15*1.5=22.5→23), got ${calcDamage(infantry, cavalry)}`);
  console.assert(calcDamage(cavalry, infantry) === 9, `Cavalry vs infantry damage should be 9 (18*0.5), got ${calcDamage(cavalry, infantry)}`);
  console.assert(calcDamage(archer, infantry) === 30, `Archer vs infantry damage should be 30 (20*1.5), got ${calcDamage(archer, infantry)}`);
  console.assert(calcDamage(infantry, archer) === 8, `Infantry vs archer damage should be 8 (15*0.5=7.5→8), got ${calcDamage(infantry, archer)}`);

  // 测试相邻单位交战
  const state = {
    tiles: {
      '0,0': { q: 0, r: 0, owner: 'player', revealed: true },
      '1,0': { q: 1, r: 0, owner: 'ai', revealed: true }
    },
    units: [
      { type: 'infantry', name: '步兵', hp: 220, atk: 15, currentHp: 220, owner: 'player', tileKey: '0,0', q: 0, r: 0 },
      { type: 'cavalry', name: '骑兵', hp: 180, atk: 18, currentHp: 180, owner: 'ai', tileKey: '1,0', q: 1, r: 0 }
    ]
  };

  combatTick(state);

  // 步兵克制骑兵，受到骑兵 9 点伤害，骑兵受到步兵 22 点伤害
  console.assert(state.units[0].currentHp === 211, `Player infantry should have 211 HP (220-9), got ${state.units[0].currentHp}`);
  console.assert(state.units[1].currentHp === 157, `AI cavalry should have 157 HP (180-23), got ${state.units[1].currentHp}`);

  // 测试非相邻单位不交战
  const state2 = {
    tiles: {
      '0,0': { q: 0, r: 0, owner: 'player', revealed: true },
      '3,0': { q: 3, r: 0, owner: 'ai', revealed: true }
    },
    units: [
      { type: 'infantry', name: '步兵', hp: 220, atk: 15, currentHp: 220, owner: 'player', tileKey: '0,0', q: 0, r: 0 },
      { type: 'cavalry', name: '骑兵', hp: 180, atk: 18, currentHp: 180, owner: 'ai', tileKey: '3,0', q: 3, r: 0 }
    ]
  };

  combatTick(state2);
  console.assert(state2.units[0].currentHp === 220, 'Non-adjacent units should not take damage');
  console.assert(state2.units[1].currentHp === 180, 'Non-adjacent units should not take damage');

  // 测试同阵营单位不交战
  const state3 = {
    tiles: {
      '0,0': { q: 0, r: 0, owner: 'player', revealed: true },
      '1,0': { q: 1, r: 0, owner: 'player', revealed: true }
    },
    units: [
      { type: 'infantry', name: '步兵', hp: 220, atk: 15, currentHp: 220, owner: 'player', tileKey: '0,0', q: 0, r: 0 },
      { type: 'cavalry', name: '骑兵', hp: 180, atk: 18, currentHp: 180, owner: 'player', tileKey: '1,0', q: 1, r: 0 }
    ]
  };

  combatTick(state3);
  console.assert(state3.units[0].currentHp === 220, 'Same-faction units should not fight');
  console.assert(state3.units[1].currentHp === 180, 'Same-faction units should not fight');

  console.log('[test] Combat damage tests passed');
})();
